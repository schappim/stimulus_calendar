name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  js:
    name: JS core — build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:lib   # IIFE + ESM library bundles must build
      - run: npm test            # vitest
