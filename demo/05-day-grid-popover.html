<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stimulus_calendar — Day popover</title>
  <link rel="stylesheet" href="../src/styles/calendar.css">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 2rem; }
    .ec { width: 920px; }
  </style>
</head>
<body>
  <h1>Day popover</h1>
  <p>Multiple events on one day collapse to "+N more"; clicking opens the popover.</p>
  <div data-controller="calendar"
       data-calendar-plugins-value='["DayGrid"]'
       data-calendar-view-value="dayGridMonth"
       data-calendar-date-value="2026-05-15"
       data-calendar-day-max-events-value="2"
       data-calendar-header-toolbar-value='{"start":"today","center":"title","end":"prev,next"}'>
  </div>
  <script type="module">
    import { Application } from '/node_modules/@hotwired/stimulus/dist/stimulus.js';
    import CalendarController from '/src/controllers/calendar_controller.js';
    const app = Application.start();
    app.register('calendar', CalendarController);
    await new Promise((r) => setTimeout(r, 50));
    const el = document.querySelector('[data-controller="calendar"]');
    for (let i = 1; i <= 5; ++i) {
      el.calendarApi.addEvent({
        id: String(i),
        title: ['Standup','Design crit','1:1','Code review','Demo'][i-1],
        start: '2026-05-15T0' + (8 + i) + ':00',
        end: '2026-05-15T0' + (8 + i) + ':30',
      });
    }
    await new Promise((r) => setTimeout(r, 20));
    el.querySelector('[data-more-link]')?.click();
  </script>
</body>
</html>
