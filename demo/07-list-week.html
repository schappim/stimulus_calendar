<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stimulus_calendar — List week view</title>
  <link rel="stylesheet" href="../src/styles/calendar.css">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 2rem; }
    .ec { width: 600px; }
    .ec-title { font-size: 1.25rem; margin: 0; text-align: center; }
    .ec-list { border: 1px solid #ddd; margin-top: 1rem; }
    .ec-day-head { display: flex; justify-content: space-between; padding: 0.5rem 1rem; background: #f8fafc; border-bottom: 1px solid #ddd; font-weight: 600; }
    .ec-day-side { color: #64748b; font-weight: normal; }
    .ec-event { display: grid; grid-template-columns: 12px 100px 1fr; gap: 0.5rem; padding: 0.5rem 1rem; border-bottom: 1px solid #f1f5f9; }
    .ec-event-tag { width: 8px; height: 8px; margin-top: 4px; background: #2563eb; border-radius: 50%; }
    .ec-event-time { color: #475569; }
    .ec-no-events { padding: 2rem; text-align: center; color: #94a3b8; }
  </style>
</head>
<body>
  <h1>List week view</h1>
  <div data-controller="calendar"
       data-calendar-plugins-value='["List"]'
       data-calendar-view-value="listWeek"
       data-calendar-date-value="2026-05-25"
       data-calendar-header-toolbar-value='{"start":"today","center":"title","end":"prev,next"}'>
  </div>
  <script type="module">
    import { Application } from '/node_modules/@hotwired/stimulus/dist/stimulus.js';
    import CalendarController from '/src/controllers/calendar_controller.js';
    Application.start().register('calendar', CalendarController);
    await new Promise((r) => setTimeout(r, 50));
    const el = document.querySelector('[data-controller="calendar"]');
    el.calendarApi.addEvent({ id:'1', title:'Standup',    start:'2026-05-25T09:00', end:'2026-05-25T09:30' });
    el.calendarApi.addEvent({ id:'2', title:'1:1 with Alex', start:'2026-05-25T11:00', end:'2026-05-25T11:30' });
    el.calendarApi.addEvent({ id:'3', title:'Design crit',start:'2026-05-26T14:00', end:'2026-05-26T15:30' });
    el.calendarApi.addEvent({ id:'4', title:'Holiday', allDay:true, start:'2026-05-29', end:'2026-05-30' });
    el.calendarApi.addEvent({ id:'5', title:'Demo', start:'2026-05-30T17:00', end:'2026-05-30T18:00' });
  </script>
</body>
</html>
