<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stimulus_calendar — TimeGrid day view</title>
  <link rel="stylesheet" href="../src/styles/calendar.css">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 2rem; }
    .ec { width: 620px; }
  </style>
</head>
<body>
  <h1>TimeGrid day view</h1>
  <div data-controller="calendar"
       data-calendar-plugins-value='["TimeGrid"]'
       data-calendar-view-value="timeGridDay"
       data-calendar-date-value="2026-05-25"
       data-calendar-options-value='{"scrollTime":"08:00:00"}'
       data-calendar-header-toolbar-value='{"start":"today","center":"title","end":"prev,next"}'>
  </div>
  <script type="module">
    import { Application } from '/node_modules/@hotwired/stimulus/dist/stimulus.js';
    import CalendarController from '/src/controllers/calendar_controller.js';
    const app = Application.start();
    app.register('calendar', CalendarController);
    await new Promise((r) => setTimeout(r, 50));
    const el = document.querySelector('[data-controller="calendar"]');
    el.calendarApi.addEvent({ id:'1', title:'Standup',      start:'2026-05-25T09:00', end:'2026-05-25T09:30' });
    el.calendarApi.addEvent({ id:'2', title:'1:1 Alex',     start:'2026-05-25T11:00', end:'2026-05-25T11:30' });
    el.calendarApi.addEvent({ id:'3', title:'Design crit',  start:'2026-05-25T14:00', end:'2026-05-25T15:30' });
  </script>
</body>
</html>
