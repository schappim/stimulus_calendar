<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stimulus_calendar — DayGrid month view</title>
  <link rel="stylesheet" href="../src/styles/calendar.css">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 2rem; }
    .ec { width: 920px; }
  </style>
</head>
<body>
  <h1>DayGrid month view</h1>
  <div data-controller="calendar"
       data-calendar-plugins-value='["DayGrid"]'
       data-calendar-view-value="dayGridMonth"
       data-calendar-date-value="2026-05-15"
       data-calendar-header-toolbar-value='{"start":"today","center":"title","end":"prev,next"}'>
  </div>
  <script type="module">
    import { Application } from '/node_modules/@hotwired/stimulus/dist/stimulus.js';
    import CalendarController from '/src/controllers/calendar_controller.js';
    const app = Application.start();
    app.register('calendar', CalendarController);
    await new Promise((r) => setTimeout(r, 50));
    const el = document.querySelector('[data-controller="calendar"]');
    el.calendarApi.addEvent({ id:'a', title:'Conference',  start:'2026-05-04', end:'2026-05-07', allDay:true });
    el.calendarApi.addEvent({ id:'b', title:'Sales review', start:'2026-05-11T10:00', end:'2026-05-11T11:00' });
    el.calendarApi.addEvent({ id:'c', title:'Design crit',  start:'2026-05-13T14:00', end:'2026-05-13T15:30' });
    el.calendarApi.addEvent({ id:'d', title:'1:1 Alex',     start:'2026-05-19T11:00', end:'2026-05-19T11:30' });
    el.calendarApi.addEvent({ id:'e', title:'Offsite',      start:'2026-05-20', end:'2026-05-23', allDay:true });
    el.calendarApi.addEvent({ id:'f', title:'Release',      start:'2026-05-28T17:00', end:'2026-05-28T18:00' });
  </script>
</body>
</html>
