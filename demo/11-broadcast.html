<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stimulus_calendar — live multi-user sync</title>
  <link rel="stylesheet" href="../src/styles/calendar.css">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 2rem; }
    .windows { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .window {
      border: 1px solid #cbd5e1; border-radius: 12px; padding: 1rem;
      background: #ffffff; box-shadow: 0 4px 12px -2px rgba(15,23,42,0.08);
    }
    .window-chrome {
      display: flex; gap: 0.25rem; margin-bottom: 0.75rem;
      align-items: center;
    }
    .window-chrome span { width: 10px; height: 10px; border-radius: 50%; }
    .window-chrome span.red { background: #ef4444; }
    .window-chrome span.yel { background: #f59e0b; }
    .window-chrome span.grn { background: #10b981; }
    .window-chrome b { margin-left: 0.5rem; font-size: 0.75rem; color: #475569; font-weight: 500; }
    .ec { width: 100%; }
    .ec-time-grid [data-row="body"] { max-height: 380px; }
    .live-badge {
      display: inline-flex; align-items: center; gap: 0.375rem;
      font-size: 0.75rem; padding: 2px 0.5rem; border-radius: 999px;
      background: #ecfdf5; color: #047857; font-weight: 500;
      margin-left: auto;
    }
    .live-badge::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #10b981; box-shadow: 0 0 0 3px #d1fae5;
    }
  </style>
</head>
<body>
  <h1>Live multi-user sync</h1>
  <p>Two browser windows subscribed to the same broadcast channel. A drag in one window appears
     in the other within ~50&nbsp;ms.</p>

  <div class="windows">
    <div class="window">
      <div class="window-chrome">
        <span class="red"></span><span class="yel"></span><span class="grn"></span>
        <b>Alex — Chrome</b>
        <span class="live-badge">live</span>
      </div>
      <div id="cal-a"
           data-controller="calendar"
           data-calendar-plugins-value='["TimeGrid"]'
           data-calendar-view-value="timeGridWeek"
           data-calendar-date-value="2026-05-25"
           data-calendar-options-value='{"scrollTime":"08:00:00"}'
           data-calendar-broadcast-value="broadcast-channel"
           data-calendar-broadcast-channel-value="demo-events"
           data-calendar-header-toolbar-value='{"start":"today","center":"title","end":"prev,next"}'>
      </div>
    </div>

    <div class="window">
      <div class="window-chrome">
        <span class="red"></span><span class="yel"></span><span class="grn"></span>
        <b>Sam — Firefox</b>
        <span class="live-badge">live</span>
      </div>
      <div id="cal-b"
           data-controller="calendar"
           data-calendar-plugins-value='["TimeGrid"]'
           data-calendar-view-value="timeGridWeek"
           data-calendar-date-value="2026-05-25"
           data-calendar-options-value='{"scrollTime":"08:00:00"}'
           data-calendar-broadcast-value="broadcast-channel"
           data-calendar-broadcast-channel-value="demo-events"
           data-calendar-header-toolbar-value='{"start":"today","center":"title","end":"prev,next"}'>
      </div>
    </div>
  </div>

  <script type="module">
    import { Application } from '/node_modules/@hotwired/stimulus/dist/stimulus.js';
    import CalendarController from '/src/controllers/calendar_controller.js';
    const app = Application.start();
    app.register('calendar', CalendarController);
    await new Promise((r) => setTimeout(r, 100));
    const a = document.getElementById('cal-a');
    const b = document.getElementById('cal-b');
    // Seed both windows with the same starting state.
    for (const el of [a, b]) {
      el.calendarApi.addEvent({ id:'1', title:'Standup',     start:'2026-05-25T09:00', end:'2026-05-25T09:30' });
      el.calendarApi.addEvent({ id:'2', title:'Design crit', start:'2026-05-26T14:00', end:'2026-05-26T15:30' });
      el.calendarApi.addEvent({ id:'3', title:'1:1 Alex',    start:'2026-05-27T11:00', end:'2026-05-27T11:30' });
    }
    // "Alex moves Design crit" — we ONLY mutate window A. The BroadcastBus
    // pushes the change through BroadcastChannel("demo-events"); window B's
    // bus receives it and applies it to its local state. If broadcast wiring
    // is broken, window B will still show the old position — making this
    // demo a genuine end-to-end smoke test.
    await new Promise((r) => setTimeout(r, 40));
    a.calendarApi.updateEvent({ id:'2', title:'Design crit', start:'2026-05-28T10:00', end:'2026-05-28T11:30' });
    // Brief settle so the BroadcastChannel deliver loop completes before the
    // screenshot is captured.
    await new Promise((r) => setTimeout(r, 80));
  </script>
</body>
</html>
