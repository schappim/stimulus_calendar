<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stimulus_calendar — TimeGrid week view</title>
  <link rel="stylesheet" href="../src/styles/calendar.css">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 2rem; }
    .ec { width: 900px; }
    .ec-title { font-size: 1.25rem; margin: 0; text-align: center; }
    .ec-time-grid {
      display: grid; grid-template-rows: auto 1fr;
      border: 1px solid #ddd; margin-top: 1rem;
    }
    [data-row="header"] {
      display: grid; grid-template-columns: 60px repeat(var(--ec-cols, 7), 1fr);
      background: #f8fafc; border-bottom: 1px solid #ddd;
    }
    .ec-day-head, .ec-corner { padding: 0.5rem; font-weight: 600; border-right: 1px solid #ddd; }
    [data-row="body"] {
      display: grid; grid-template-columns: 60px 1fr;
      max-height: 500px; overflow-y: auto;
    }
    .ec-sidebar { display: flex; flex-direction: column; }
    .ec-sidebar .ec-slot { font-size: 0.75rem; color: #475569; padding: 0 0.5rem; border-bottom: 1px dashed #e2e8f0; }
    .ec-days {
      display: grid; grid-template-columns: repeat(var(--ec-cols, 7), 1fr);
    }
    .ec-time-col { border-left: 1px solid #e2e8f0; }
    .ec-time-col .ec-slot { border-bottom: 1px dashed #e2e8f0; }
    .ec-event { background: #2563eb; color: white; font-size: 0.75rem; padding: 0.125rem 0.25rem; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>TimeGrid week view</h1>
  <div data-controller="calendar"
       data-calendar-plugins-value='["TimeGrid"]'
       data-calendar-view-value="timeGridWeek"
       data-calendar-date-value="2026-05-25"
       data-calendar-header-toolbar-value='{"start":"today","center":"title","end":"prev,next"}'>
  </div>
  <script type="module">
    import { Application } from '/node_modules/@hotwired/stimulus/dist/stimulus.js';
    import CalendarController from '/src/controllers/calendar_controller.js';
    const app = Application.start();
    app.register('calendar', CalendarController);
    await new Promise((r) => setTimeout(r, 50));
    const el = document.querySelector('[data-controller="calendar"]');
    el.calendarApi.addEvent({ id:'1', title:'Standup', start:'2026-05-25T09:00', end:'2026-05-25T09:30' });
    el.calendarApi.addEvent({ id:'2', title:'Design crit', start:'2026-05-26T14:00', end:'2026-05-26T15:30' });
    el.calendarApi.addEvent({ id:'3', title:'1:1',         start:'2026-05-27T11:00', end:'2026-05-27T11:30' });
  </script>
</body>
</html>
