<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>stimulus_calendar — DayGrid week view</title>
  <link rel="stylesheet" href="../src/styles/calendar.css">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; margin: 2rem; }
    .ec { width: 920px; }
  </style>
</head>
<body>
  <h1>DayGrid week view</h1>
  <div data-controller="calendar"
       data-calendar-plugins-value='["DayGrid"]'
       data-calendar-view-value="dayGridWeek"
       data-calendar-date-value="2026-05-25"
       data-calendar-header-toolbar-value='{"start":"today","center":"title","end":"prev,next"}'>
  </div>
  <script type="module">
    import { Application } from '/node_modules/@hotwired/stimulus/dist/stimulus.js';
    import CalendarController from '/src/controllers/calendar_controller.js';
    const app = Application.start();
    app.register('calendar', CalendarController);
    await new Promise((r) => setTimeout(r, 50));
    const el = document.querySelector('[data-controller="calendar"]');
    el.calendarApi.addEvent({ id:'a', title:'Standup',     start:'2026-05-25T09:00', end:'2026-05-25T09:30' });
    el.calendarApi.addEvent({ id:'b', title:'Design crit', start:'2026-05-26T14:00', end:'2026-05-26T15:30' });
    el.calendarApi.addEvent({ id:'c', title:'1:1 Alex',    start:'2026-05-27T11:00', end:'2026-05-27T11:30' });
    el.calendarApi.addEvent({ id:'d', title:'Release',     start:'2026-05-28T17:00', end:'2026-05-28T18:00' });
    el.calendarApi.addEvent({ id:'e', title:'Demo day',    start:'2026-05-29T10:00', end:'2026-05-29T11:00' });
  </script>
</body>
</html>
